name: Pareto Pipeline

on:
  schedule:
    - cron: '0 14 * * 0'
  workflow_dispatch:
    inputs:
      period:
        description: 'Period key (blank = ALL). Examples: q4_2025 | full_year_2025 | q1_2026'
        required: false
        default: ''

jobs:
  pareto:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests gspread google-auth pytz
      - name: Run Pareto Pipeline
        env:
          SHOPIFY_STORE:       equestrian-labs.myshopify.com
          SHOPIFY_TOKEN_CORRO: ${{ secrets.SHOPIFY_TOKEN_CORRO }}
          SHEET_ID_CORRO:      ${{ secrets.SHEET_ID_CORRO }}
          GOOGLE_CREDENTIALS:  ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          PERIOD="${{ github.event.inputs.period }}"
          if [ -z "$PERIOD" ]; then
            echo "Full backfill"
            python pareto_v1.py
          else
            echo "Single period: $PERIOD"
            python pareto_v1.py --only "$PERIOD"
          fi
